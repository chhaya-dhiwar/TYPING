let selectedDuration = 1;
let timerInterval;
let timeLeft = selectedDuration * 60; // in seconds
let isTestRunning = false;
let totalWordsTyped = 0;
let correctWords = 0;
let incorrectWords = 0;
let currentTextIndex = 0;

const resetBtn = document.getElementById('reset-btn');
const timerElement = document.getElementById('timer');
const typingInput = document.getElementById('typing-input');
const wpmElement = document.getElementById('wmp');
const accuracyElement = document.getElementById('accuracy');
const textToTypeElement = document.getElementById('text-to-type');

document.getElementById('duration').addEventListener('change', function () {
    selectedDuration = parseInt(this.value);
    timeLeft = selectedDuration * 60;
    startTypingTest(); // Automatically start the typing test when duration is selected
    updateTimerDisplay();
});

function startTypingTest() {
    if (!isTestRunning) {
        typingInput.disabled = false;
        typingInput.focus();
        resetBtn.disabled = false;
        currentTextIndex = (currentTextIndex + 1) % paragraphs[selectedDuration].length;
        totalWordsTyped = 0;
        correctWords = 0;
        incorrectWords = 0;
        textToTypeElement.innerText = paragraphs[selectedDuration][currentTextIndex];
        typingInput.value = '';
        timeLeft = selectedDuration * 60;
        updateTimerDisplay();
    }
}

function startTimer() {
    timerInterval = setInterval(function () {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            endTest();
        }
    }, 1000);
}

function updateTimerDisplay() {
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    timerElement.innerText = `Time Left: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
}

function endTest() {
    typingInput.disabled = true;
    const wordsPerMinute = (totalWordsTyped / 5) / (selectedDuration - (timeLeft / 60));
    const accuracy = (correctWords / (correctWords + incorrectWords)) * 100;
    wpmElement.innerText = `WPM: ${Math.round(wordsPerMinute)}`;
    accuracyElement.innerText = `Accuracy: ${Math.round(accuracy)}%`;
}

function resetTest() {
    clearInterval(timerInterval);
    timeLeft = selectedDuration * 60;
    isTestRunning = false;
    typingInput.value = '';
    currentTextIndex = (currentTextIndex + 1) % paragraphs[selectedDuration].length;
    textToTypeElement.innerText = paragraphs[selectedDuration][currentTextIndex];
    wpmElement.innerText = 'WPM: 0';
    accuracyElement.innerText = 'Accuracy: 0%';
    typingInput.disabled = true;
    updateTimerDisplay();
}

typingInput.addEventListener('input', function () {
    if (!isTestRunning) {
        startTimer();
        isTestRunning = true;
    }

    const typedText = typingInput.value;
    const currentText = paragraphs[selectedDuration][currentTextIndex];
    totalWordsTyped = typedText.split(' ').length;

    correctWords = 0;
    incorrectWords = 0;

    textToTypeElement.innerHTML = '';

    currentText.split('').forEach((char, index) => {
        const charSpan = document.createElement('span');
        if (typedText[index] === char) {
            charSpan.classList.add('correct');
        } else if (typedText[index] !== undefined) {
            charSpan.classList.add('incorrect');
        }
        charSpan.innerText = char === ' ' ? ' ' : char; // Represent spaces visually
        textToTypeElement.appendChild(charSpan);
    });

    for (let i = 0; i < typedText.length; i++) {
        if (typedText[i] === currentText[i]) {
            correctWords++;
        } else {
            incorrectWords++;
        }
    }

    const wordsPerMinute = (totalWordsTyped / 5) / (selectedDuration - (timeLeft / 60));
    const accuracy = (correctWords / (correctWords + incorrectWords)) * 100;
    wpmElement.innerText = `WPM: ${Math.round(wordsPerMinute)}`;
    accuracyElement.innerText = `Accuracy: ${Math.round(accuracy)}%`;

    if (typedText === currentText) {
        currentTextIndex++;
        if (currentTextIndex < paragraphs[selectedDuration].length) {
            textToTypeElement.innerText = paragraphs[selectedDuration][currentTextIndex];
            typingInput.value = '';
        } else {
            endTest();
        }
    }
});
  
    // Dark mode toggle functionality
    const darkModeToggle = document.getElementById('darkModeToggle');
    darkModeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const currentMode = document.body.classList.contains('dark-mode') ? 'Light' : 'Dark';
      darkModeToggle.textContent = currentMode;
    });
